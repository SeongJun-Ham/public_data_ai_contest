<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>급식 식단 교환 추천</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── 리셋 & 변수 ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f5f6fa;
  --bg2:       #ffffff;
  --bg3:       #f0f1f5;
  --border:    rgba(0,0,0,0.07);
  --border2:   rgba(0,0,0,0.13);
  --text:      #1a1d2e;
  --text2:     #5a5f7a;
  --text3:     #9599b3;
  --accent:    #4361ee;
  --accent2:   #2d4fd6;
  --rank1:     #e03131;
  --rank1bg:   rgba(224,49,49,0.07);
  --rank1bd:   rgba(224,49,49,0.28);
  --rank2:     #e8590c;
  --rank2bg:   rgba(232,89,12,0.07);
  --rank2bd:   rgba(232,89,12,0.28);
  --rank3:     #c08000;
  --rank3bg:   rgba(192,128,0,0.07);
  --rank3bd:   rgba(192,128,0,0.28);
  --ok:        #0ca678;
  --okbg:      rgba(12,166,120,0.08);
  --font:      'Noto Sans KR', sans-serif;
  --mono:      'DM Mono', monospace;
  --radius:    12px;
  --radius-sm: 8px;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ── 레이아웃 ─────────────────────────────────────────── */
.wrap { max-width: 1400px; margin: 0 auto; padding: 0 24px 80px; }

/* ── 헤더 ─────────────────────────────────────────────── */
header {
  padding: 40px 0 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 36px;
}
header h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
}
header p {
  color: var(--text2);
  font-size: 13px;
  margin-top: 6px;
}
.header-inner {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.badge-steps {
  display: flex;
  gap: 8px;
  align-items: center;
}
.step-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: var(--mono);
}
.step-badge.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ── 업로드 섹션 ──────────────────────────────────────── */
.upload-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
@media (max-width: 640px) { .upload-grid { grid-template-columns: 1fr; } }

.upload-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: border-color .2s;
}
.upload-card:hover { border-color: var(--border2); }
.upload-card.has-file { border-color: rgba(91,127,255,0.4); }

.upload-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-basis { background: var(--ok); }
.dot-target { background: var(--accent); }

.upload-zone {
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius-sm);
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent);
  background: rgba(91,127,255,0.05);
}
.upload-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
}
.upload-icon { font-size: 24px; margin-bottom: 8px; }
.upload-text { font-size: 13px; color: var(--text2); }
.upload-sub  { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: var(--mono); }
.file-name {
  font-size: 12px;
  color: var(--ok);
  margin-top: 10px;
  font-family: var(--mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── 파라미터 패널 ────────────────────────────────────── */
.params-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  align-items: flex-end;
  margin-bottom: 24px;
}
.param-group { display: flex; flex-direction: column; gap: 6px; min-width: 120px; }
.param-group label {
  font-size: 11px; color: var(--text2); font-weight: 500; letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 5px;
}
.auto-badge {
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 99px;
  background: rgba(62,207,142,0.18);
  color: var(--ok);
  letter-spacing: 0.04em;
  font-family: var(--mono);
  display: none;
}
.auto-badge.visible { display: inline; }
.param-group input[type=number] {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 7px 10px;
  width: 100%;
  outline: none;
  transition: border-color .2s;
}
.param-group input:focus { border-color: var(--accent); }
.run-btn {
  margin-left: auto;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 28px;
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.run-btn:hover { background: var(--accent2); transform: translateY(-1px); }
.run-btn:active { transform: translateY(0); }
.run-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

/* ── 학교 선택 ────────────────────────────────────────── */
.school-row {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.school-select {
  flex: 1;
  min-width: 200px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  cursor: pointer;
}
.school-select:focus { border-color: var(--accent); }
.school-info {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--mono);
}

/* ── 결과 레이아웃 ────────────────────────────────────── */
.results-grid {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 20px;
  align-items: start;
}
@media (max-width: 900px) { .results-grid { grid-template-columns: 1fr; } }

/* ── 추천 리스트 패널 ────────────────────────────────── */
.reco-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  position: sticky;
  top: 20px;
}
.reco-panel-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.reco-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.reco-item:last-child { border-bottom: none; }
.reco-item:hover { background: var(--bg3); }
.reco-item.selected { background: rgba(91,127,255,0.08); }

.reco-rank {
  font-size: 10px;
  font-weight: 600;
  font-family: var(--mono);
  letter-spacing: 0.1em;
  margin-bottom: 5px;
}
.rank-1 { color: var(--rank1); }
.rank-2 { color: var(--rank2); }
.rank-3 { color: var(--rank3); }

.reco-dates {
  font-size: 13px;
  font-weight: 500;
  font-family: var(--mono);
  color: var(--text);
  margin-bottom: 6px;
}
.reco-scores {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.score-pill {
  font-size: 10px;
  font-family: var(--mono);
  padding: 2px 7px;
  border-radius: 99px;
  border: 1px solid var(--border2);
  color: var(--text2);
}

/* ── 달력 ─────────────────────────────────────────────── */
.calendar-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.calendar-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.calendar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text2);
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.cal-dow {
  padding: 10px 0;
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border);
}
.cal-dow:nth-child(1) { color: #e03131; }
.cal-dow:nth-child(7) { color: #4361ee; }

.cal-cell {
  min-height: 100px;
  padding: 8px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  position: relative;
  transition: background .15s;
  cursor: default;
  vertical-align: top;
}
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.empty { background: transparent; cursor: default; }
.cal-cell.has-data:hover { background: var(--bg3); }
.cal-cell.highlighted-1 {
  background: var(--rank1bg) !important;
  border: 1.5px solid var(--rank1bd) !important;
}
.cal-cell.highlighted-2 {
  background: var(--rank2bg) !important;
  border: 1.5px solid var(--rank2bd) !important;
}
.cal-cell.highlighted-3 {
  background: var(--rank3bg) !important;
  border: 1.5px solid var(--rank3bd) !important;
}

.cal-date {
  font-size: 12px;
  font-family: var(--mono);
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 6px;
}
.cal-cell.highlighted-1 .cal-date { color: var(--rank1); font-weight: 600; }
.cal-cell.highlighted-2 .cal-date { color: var(--rank2); font-weight: 600; }
.cal-cell.highlighted-3 .cal-date { color: var(--rank3); font-weight: 600; }

.cal-rank-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
}
.badge-r1 { background: var(--rank1); color: #fff; }
.badge-r2 { background: var(--rank2); color: #fff; }
.badge-r3 { background: var(--rank3); color: #fff; }

.cal-menus {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.cal-menu-item {
  font-size: 10.5px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}
.cal-menu-item.is-repeat {
  color: var(--rank1);
  font-weight: 500;
}
.cal-more { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* ── 상세 패널 (하단) ────────────────────────────────── */
.detail-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 20px;
  overflow: hidden;
  display: none;
}
.detail-panel.visible { display: block; }
.detail-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.detail-head h3 { font-size: 13px; font-weight: 600; color: var(--text); }
.close-btn {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 0 2px;
  transition: color .15s;
}
.close-btn:hover { color: var(--text); }
.detail-body {
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 600px) { .detail-body { grid-template-columns: 1fr; } }
.detail-col h4 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}
.detail-date {
  font-size: 16px;
  font-weight: 600;
  font-family: var(--mono);
  margin-bottom: 10px;
}
.detail-col-hi .detail-date { color: var(--rank1); }
.detail-col-lo .detail-date { color: var(--ok); }
.detail-menu-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.detail-menu-list li {
  font-size: 13px;
  color: var(--text);
  padding: 5px 10px;
  border-radius: 6px;
  background: var(--bg3);
}
.detail-menu-list li.repeat-menu {
  color: var(--rank1);
  background: var(--rank1bg);
  border: 1px solid var(--rank1bd);
}
.detail-score-row {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
  margin-top: 16px;
  grid-column: 1/-1;
}
.score-card {
  background: var(--bg3);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}
.score-card-val {
  font-size: 18px;
  font-weight: 600;
  font-family: var(--mono);
  color: var(--accent);
  margin-bottom: 4px;
}
.score-card-lbl {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* ── 빈 상태 / 로딩 ─────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-state .icon { font-size: 36px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

.progress-wrap {
  padding: 40px 20px;
  text-align: center;
}
.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--border2);
  border-radius: 99px;
  overflow: hidden;
  margin: 16px auto 0;
  max-width: 300px;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  width: 0%;
  transition: width .3s ease;
}
.progress-label { font-size: 13px; color: var(--text2); }

/* ── 토스트 ──────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 12px 18px;
  font-size: 13px;
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(8px);
  transition: all .25s;
  z-index: 1000;
  max-width: 320px;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-color: var(--rank1bd); color: var(--rank1); }
</style>
</head>
<body>
<div class="wrap">

  <!-- 헤더 -->
  <header>
    <div class="header-inner">
      <div>
        <h1>급식 식단 교환 추천 시스템</h1>
        <p>이전 식단(basis) 패턴을 학습해 신규 식단(target)의 반복 메뉴를 탐지하고 최적 교환 날짜를 추천합니다</p>
      </div>
      <div class="badge-steps">
        <span class="step-badge active" id="step1-badge">01 업로드</span>
        <span style="color:var(--text3);font-size:12px">→</span>
        <span class="step-badge" id="step2-badge">02 분석</span>
        <span style="color:var(--text3);font-size:12px">→</span>
        <span class="step-badge" id="step3-badge">03 결과</span>
      </div>
    </div>
  </header>

  <!-- 업로드 -->
  <div class="upload-grid">
    <div class="upload-card" id="card-basis">
      <div class="upload-label">
        <span class="dot dot-basis"></span>
        이전 식단 &nbsp;<span style="font-family:var(--mono);font-size:10px;color:var(--text3)">menu_basis.csv</span>
      </div>
      <div class="upload-zone" id="zone-basis">
        <input type="file" accept=".csv" id="file-basis">
        <div class="upload-icon">📂</div>
        <div class="upload-text">파일을 드래그하거나 클릭하여 업로드</div>
        <div class="upload-sub">1~11월 급식 데이터 · CSV</div>
      </div>
      <div class="file-name" id="name-basis" style="display:none"></div>
    </div>
    <div class="upload-card" id="card-target">
      <div class="upload-label">
        <span class="dot dot-target"></span>
        신규 식단 &nbsp;<span style="font-family:var(--mono);font-size:10px;color:var(--text3)">menu_target.csv</span>
      </div>
      <div class="upload-zone" id="zone-target">
        <input type="file" accept=".csv" id="file-target">
        <div class="upload-icon">📅</div>
        <div class="upload-text">파일을 드래그하거나 클릭하여 업로드</div>
        <div class="upload-sub">12월 급식 데이터 · CSV</div>
      </div>
      <div class="file-name" id="name-target" style="display:none"></div>
    </div>
  </div>

  <!-- 파라미터 -->
  <div class="params-row">
    <div class="param-group">
      <label>반복 기준 횟수 <span class="auto-badge" id="badge-repeat">AUTO</span></label>
      <input type="number" id="p-repeat" value="5" min="1" max="30" step="1">
    </div>
    <div class="param-group">
      <label>Baseline 배율 <span class="auto-badge" id="badge-mult">AUTO</span></label>
      <input type="number" id="p-mult" value="1.5" min="1.0" max="5.0" step="0.1">
    </div>
    <div class="param-group">
      <label>메뉴 다양성 α</label>
      <input type="number" id="p-alpha" value="0.5" min="0" max="1" step="0.1">
    </div>
    <div class="param-group">
      <label>영양 유사도 β</label>
      <input type="number" id="p-beta" value="0.5" min="0" max="1" step="0.1">
    </div>
    <div class="param-group">
      <label>추천 수 (Top K)</label>
      <input type="number" id="p-topk" value="5" min="1" max="20" step="1">
    </div>
    <button class="run-btn" id="run-btn" disabled>분석 시작 →</button>
  </div>

  <!-- 학교 선택 (분석 후 노출) -->
  <div id="school-row" class="school-row" style="display:none">
    <select class="school-select" id="school-select"></select>
    <span class="school-info" id="school-info"></span>
  </div>

  <!-- 결과 영역 -->
  <div id="result-area">
    <div class="empty-state">
      <div class="icon">🍱</div>
      <p>CSV 파일을 업로드하고 분석을 시작하세요</p>
    </div>
  </div>

</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════
   유틸 함수
══════════════════════════════════════════════════════ */
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'toast'; }, 3200);
}

function fmtDate(d) {
  // "20251203" → "12.03 (수)"
  const s = String(d);
  const y = s.slice(0,4), m = s.slice(4,6), day = s.slice(6,8);
  const dow = ['일','월','화','수','목','금','토'][new Date(`${y}-${m}-${day}`).getDay()];
  return `${m}.${day} (${dow})`;
}

/* ── CSV 파싱 ───────────────────────────────────────── */
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const header = parseCSVLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    header.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  });
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

function parseMenuList(raw) {
  if (!raw) return [];
  // "[' 찹쌀밥', '미역국']" 형태 파싱
  try {
    return raw
      .replace(/^\[|\]$/g, '')
      .split(',')
      .map(s => s.trim().replace(/^['"]|['"]$/g, '').trim())
      .filter(Boolean);
  } catch { return []; }
}

function parseNum(v) {
  if (v === '' || v === null || v === undefined) return null;
  const m = String(v).match(/[\d.]+/);
  return m ? parseFloat(m[0]) : null;
}

/* ══════════════════════════════════════════════════════
   TF-IDF (char n-gram 2~4) — Python 로직 포팅
══════════════════════════════════════════════════════ */
function charNgrams(text, n) {
  const padded = `\u25a0${text}\u25a0`; // boundary marker
  const grams = [];
  for (let i = 0; i <= padded.length - n; i++) grams.push(padded.slice(i, i+n));
  return grams;
}

function buildTfidf(docs) {
  // 1. 전체 vocab
  const df = {}; // document frequency
  const tfList = docs.map(doc => {
    const freq = {};
    for (let n = 2; n <= 4; n++) {
      charNgrams(doc, n).forEach(g => { freq[g] = (freq[g]||0) + 1; });
    }
    Object.keys(freq).forEach(g => { df[g] = (df[g]||0) + 1; });
    return freq;
  });

  const vocab = Object.keys(df);
  const N = docs.length;

  // 2. TF-IDF 벡터화
  const vecs = tfList.map(freq => {
    const vec = new Float32Array(vocab.length);
    vocab.forEach((g, i) => {
      if (freq[g]) {
        const tf = freq[g] / Object.values(freq).reduce((a,b)=>a+b,0);
        const idf = Math.log((N + 1) / (df[g] + 1)) + 1;
        vec[i] = tf * idf;
      }
    });
    // L2 정규화
    const norm = Math.sqrt(vec.reduce((a,v)=>a+v*v,0));
    if (norm > 0) for (let i=0;i<vec.length;i++) vec[i] /= norm;
    return vec;
  });

  return vecs;
}

function cosineSim(a, b) {
  let dot = 0;
  for (let i = 0; i < a.length; i++) dot += a[i] * b[i];
  return Math.min(1, Math.max(-1, dot)); // 이미 정규화됨
}

/* ── StandardScaler ────────────────────────────────── */
function standardScale(matrix) {
  // matrix: [[v1,v2,...], ...]
  const n = matrix.length, m = matrix[0].length;
  const mean = new Array(m).fill(0);
  const std  = new Array(m).fill(0);
  matrix.forEach(row => row.forEach((v,j) => { mean[j] += (v||0)/n; }));
  matrix.forEach(row => row.forEach((v,j) => { std[j] += ((v||0)-mean[j])**2/n; }));
  std.forEach((_,j) => { std[j] = Math.sqrt(std[j]) || 1; });
  return matrix.map(row => row.map((v,j) => ((v||0)-mean[j])/std[j]));
}

/* ══════════════════════════════════════════════════════
   핵심 분석 로직 (Python meal_analysis.py 포팅)
══════════════════════════════════════════════════════ */
const NUTRIENT_COLS = ['칼로리정보','탄수화물(g)','단백질(g)','지방(g)','칼슘(mg)','철분(mg)'];

function buildBaseline(basisRows) {
  const counter = {};
  basisRows.forEach(row => {
    parseMenuList(row.menu_list).forEach(m => {
      counter[m] = (counter[m]||0) + 1;
    });
  });
  // 월 수 계산
  const months = new Set(basisRows.map(r => String(r['급식일자']).slice(4,6)));
  const nMonths = months.size || 11;
  const baseline = {};
  Object.entries(counter).forEach(([m,c]) => { baseline[m] = c / nMonths; });
  return baseline;
}

function detectRepeated(targetRows, baseline, threshold, mult) {
  const counter = {};
  targetRows.forEach(row => {
    parseMenuList(row.menu_list).forEach(m => {
      counter[m] = (counter[m]||0) + 1;
    });
  });
  const repeated = new Set();
  Object.entries(counter).forEach(([m, cnt]) => {
    const avg = baseline[m] || 0;
    // baseline=0 인 메뉴 = 이전에 없던 신규 메뉴 → 반복 아님
    if (avg === 0) return;
    const ratio = cnt / avg;
    if (cnt >= threshold || ratio >= mult) repeated.add(m);
  });
  return repeated;
}

function repScore(menus, repeated) {
  return menus.filter(m => repeated.has(m)).length;
}

// 날짜 문자열 "20251203" → Date 객체
function parseDate(d) {
  const s = String(d);
  return new Date(+s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8));
}

// 두 날짜 사이 일수 차이
function dayGap(d1, d2) {
  return Math.round(Math.abs(parseDate(d1) - parseDate(d2)) / 86400000);
}

function analyzeSchool(schoolRows, repeated, alpha, beta, topK) {
  if (schoolRows.length < 2) return [];

  const dates    = schoolRows.map(r => r['급식일자']);
  const menuLists= schoolRows.map(r => parseMenuList(r.menu_list));
  const texts    = menuLists.map(ms => ms.join(', '));

  // 임베딩
  const embeddings = buildTfidf(texts);

  // 영양소 벡터
  const nutRaw = schoolRows.map(r =>
    NUTRIENT_COLS.map(c => parseNum(r[c]) || 0)
  );
  const nutScaled = standardScale(nutRaw);

  // 코사인 유사도 행렬 미리 계산
  const n = dates.length;
  const menuSim   = Array.from({length:n}, (_,i) =>
    Array.from({length:n}, (_,j) => cosineSim(embeddings[i], embeddings[j]))
  );
  const nutrSim   = Array.from({length:n}, (_,i) =>
    Array.from({length:n}, (_,j) => cosineSim(nutScaled[i], nutScaled[j]))
  );

  const repScores = menuLists.map(ms => repScore(ms, repeated));

  const results = [];
  for (let i = 0; i < n; i++) {
    for (let j = i+1; j < n; j++) {
      const gap = Math.abs(repScores[i] - repScores[j]);
      if (gap === 0) continue;

      const diversity  = 1 - menuSim[i][j];
      const nSim       = (nutrSim[i][j] + 1) / 2;

      // 날짜 근접도 패널티
      // 날짜가 가까울수록(day_gap 작을수록) 같은 메뉴가 연속으로 보이는 문제 → 교환 우선순위 높임
      // date_penalty = 1 / log(2 + day_gap)
      //   day_gap=1  → 1/log(3) ≈ 0.91
      //   day_gap=5  → 1/log(7) ≈ 0.51
      //   day_gap=10 → 1/log(12) ≈ 0.40
      const dGap       = dayGap(dates[i], dates[j]);
      const datePenalty = 1 / Math.log(2 + dGap);

      const score = (alpha * diversity + beta * nSim) * Math.log1p(gap) * datePenalty;

      const [hi, lo]  = repScores[i] >= repScores[j] ? [i,j] : [j,i];
      results.push({
        date_hi:        dates[hi],
        date_lo:        dates[lo],
        rep_hi:         repScores[hi],
        rep_lo:         repScores[lo],
        rep_gap:        gap,
        day_gap:        dGap,
        date_penalty:   datePenalty,
        menu_diversity: diversity,
        nutrient_sim:   nSim,
        swap_score:     score,
        menus_hi:       menuLists[hi],
        menus_lo:       menuLists[lo],
      });
    }
  }

  results.sort((a,b) => b.swap_score - a.swap_score);
  return results.slice(0, topK);
}

/* ══════════════════════════════════════════════════════
   상태
══════════════════════════════════════════════════════ */
let basisData   = null;  // 이전 식단 rows
let targetData  = null;  // 신규 식단 rows
let allResults  = {};    // { 학교명: [candidates] }
let repeated    = new Set();
let currentSchool = null;

/* ══════════════════════════════════════════════════════
   파일 업로드 처리
══════════════════════════════════════════════════════ */
function setupUpload(inputId, zoneId, cardId, nameId, onLoad) {
  const input = document.getElementById(inputId);
  const zone  = document.getElementById(zoneId);
  const card  = document.getElementById(cardId);
  const nameEl= document.getElementById(nameId);

  input.addEventListener('change', e => handleFile(e.target.files[0]));
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file || !file.name.endsWith('.csv')) {
      toast('CSV 파일만 업로드 가능합니다', true); return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const rows = parseCSV(ev.target.result);
        if (rows.length === 0) { toast('빈 파일입니다', true); return; }
        nameEl.textContent = `✓ ${file.name}  (${rows.length.toLocaleString()}행)`;
        nameEl.style.display = 'block';
        card.classList.add('has-file');
        onLoad(rows);
        checkReady();
      } catch(e) {
        toast('CSV 파싱 오류: ' + e.message, true);
      }
    };
    reader.readAsText(file, 'utf-8');
  }
}

setupUpload('file-basis',  'zone-basis',  'card-basis',  'name-basis',  rows => {
  basisData = rows;
  autoFillParams(rows);
});
setupUpload('file-target', 'zone-target', 'card-target', 'name-target', rows => { targetData = rows; });

function checkReady() {
  document.getElementById('run-btn').disabled = !(basisData && targetData);
}

/* ══════════════════════════════════════════════════════
   파라미터 자동 계산 (basis 데이터 로드 시 호출)
══════════════════════════════════════════════════════ */
function autoFillParams(basisRows) {

  // 1. 월별 메뉴 등장 횟수: { 메뉴명: { '01': 3, '02': 5, ... } }
  const menuByMonth = {};
  basisRows.forEach(row => {
    const month = String(row['급식일자']).slice(4, 6);
    parseMenuList(row.menu_list).forEach(m => {
      if (!menuByMonth[m]) menuByMonth[m] = {};
      menuByMonth[m][month] = (menuByMonth[m][month] || 0) + 1;
    });
  });

  const months  = [...new Set(basisRows.map(r => String(r['급식일자']).slice(4, 6)))];
  const nMonths = months.length || 1;

  // 2. 메뉴별 월평균 등장 횟수
  const monthlyAvgs = Object.values(menuByMonth).map(byMonth => {
    const total = Object.values(byMonth).reduce((a, b) => a + b, 0);
    return total / nMonths;
  });

  // 3. repeat_threshold = 월평균 분포의 75th percentile (최소 2 보장)
  const sortedAvg = [...monthlyAvgs].sort((a, b) => a - b);
  const p75       = sortedAvg[Math.floor(sortedAvg.length * 0.75)] || 5;
  const threshold = Math.max(2, Math.round(p75));

  // 4. baseline_multiplier = 메뉴별 CV(변동계수) 중앙값으로 결정
  //    CV가 클수록(등장이 불규칙) 배율을 낮게 → 민감하게 반복 탐지
  //    CV가 작을수록(등장이 규칙적) 배율을 높게 → 엄격하게 반복 탐지
  const cvs = Object.values(menuByMonth)
    .filter(byMonth => Object.keys(byMonth).length >= 2)
    .map(byMonth => {
      const counts  = months.map(m => byMonth[m] || 0);
      const mean    = counts.reduce((a, b) => a + b, 0) / nMonths;
      if (mean === 0) return 0;
      const variance = counts.reduce((a, c) => a + (c - mean) ** 2, 0) / nMonths;
      return Math.sqrt(variance) / mean;
    });

  const sortedCV  = [...cvs].sort((a, b) => a - b);
  const medianCV  = sortedCV[Math.floor(sortedCV.length / 2)] || 1;
  const mult      = parseFloat(Math.max(1.1, 1.0 + 1.0 / (1.0 + medianCV)).toFixed(2));

  // 5. 인풋에 반영 + AUTO 뱃지 표시
  document.getElementById('p-repeat').value = threshold;
  document.getElementById('p-mult').value   = mult;
  document.getElementById('badge-repeat').classList.add('visible');
  document.getElementById('badge-mult').classList.add('visible');

  // 수동 수정 시 뱃지 제거
  ['p-repeat', 'p-mult'].forEach((id, i) => {
    document.getElementById(id).addEventListener('input', () => {
      const badgeId = ['badge-repeat','badge-mult'][i];
      document.getElementById(badgeId).classList.remove('visible');
    }, { once: true });
  });

  toast(`파라미터 자동 설정 — 반복 기준 ${threshold}회 · 배율 ${mult}배`);
}

/* ══════════════════════════════════════════════════════
   분석 실행
══════════════════════════════════════════════════════ */
document.getElementById('run-btn').addEventListener('click', runAnalysis);

async function runAnalysis() {
  const repeat = parseFloat(document.getElementById('p-repeat').value) || 5;
  const mult   = parseFloat(document.getElementById('p-mult').value)   || 1.5;
  const alpha  = parseFloat(document.getElementById('p-alpha').value)  || 0.5;
  const beta   = parseFloat(document.getElementById('p-beta').value)   || 0.5;
  const topK   = parseInt(document.getElementById('p-topk').value)     || 5;

  // 스텝 UI
  document.getElementById('step1-badge').classList.remove('active');
  document.getElementById('step2-badge').classList.add('active');

  // 진행 표시
  showProgress('baseline 구축 중...');

  await tick();

  // Baseline
  const baseline = buildBaseline(basisData);

  updateProgress(30, '반복 메뉴 탐지 중...');
  await tick();

  repeated = detectRepeated(targetData, baseline, repeat, mult);

  updateProgress(55, '학교별 임베딩 계산 중...');
  await tick();

  // 학교별 분석
  const schools = [...new Set(targetData.map(r => r['학교명']))].filter(Boolean);
  allResults = {};

  for (let si = 0; si < schools.length; si++) {
    const school = schools[si];
    const rows   = targetData.filter(r => r['학교명'] === school);
    allResults[school] = analyzeSchool(rows, repeated, alpha, beta, topK);
    updateProgress(55 + Math.round(40 * (si+1) / schools.length), `분석 중... ${si+1}/${schools.length}`);
    if (si % 5 === 0) await tick(); // 5개마다 UI 업데이트
  }

  updateProgress(100, '완료');
  await tick();

  // 스텝 UI
  document.getElementById('step2-badge').classList.remove('active');
  document.getElementById('step3-badge').classList.add('active');

  // 학교 선택 셀렉트 구성
  const sel = document.getElementById('school-select');
  sel.innerHTML = schools.map(s =>
    `<option value="${s}">${s}</option>`
  ).join('');
  document.getElementById('school-row').style.display = 'flex';

  currentSchool = schools[0];
  sel.value = currentSchool;
  renderResults(currentSchool);
  updateSchoolInfo(currentSchool);

  toast(`분석 완료 · ${schools.length}개 학교 · 반복 메뉴 ${repeated.size}개 탐지`);
}

document.getElementById('school-select').addEventListener('change', e => {
  currentSchool = e.target.value;
  renderResults(currentSchool);
  updateSchoolInfo(currentSchool);
  document.getElementById('detail-panel')?.classList.remove('visible');
});

function updateSchoolInfo(school) {
  const rows = targetData.filter(r => r['학교명'] === school);
  const recs = allResults[school] || [];
  document.getElementById('school-info').textContent =
    `급식일 ${rows.length}일 · 추천 ${recs.length}쌍`;
}

function tick() { return new Promise(r => setTimeout(r, 0)); }

/* ── 진행 바 ──────────────────────────────────────── */
function showProgress(label) {
  document.getElementById('result-area').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-label" id="prog-label">${label}</div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    </div>`;
}
function updateProgress(pct, label) {
  const f = document.getElementById('prog-fill');
  const l = document.getElementById('prog-label');
  if (f) f.style.width = pct + '%';
  if (l) l.textContent = label;
}

/* ══════════════════════════════════════════════════════
   결과 렌더링
══════════════════════════════════════════════════════ */
function renderResults(school) {
  const cands = allResults[school] || [];
  const rows  = targetData.filter(r => r['학교명'] === school)
                           .sort((a,b) => String(a['급식일자']).localeCompare(String(b['급식일자'])));

  // 강조 날짜 맵: date → rank(1,2,3...)
  const highlightMap = {};
  cands.forEach((c, i) => {
    const rank = i + 1;
    [c.date_hi, c.date_lo].forEach(d => {
      if (!highlightMap[d] || highlightMap[d] > rank) highlightMap[d] = rank;
    });
  });

  const html = `
    <div class="results-grid">
      <aside class="reco-panel">
        <div class="reco-panel-head">교환 추천 Top ${cands.length}</div>
        ${cands.length === 0
          ? `<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">반복 메뉴 없음</div>`
          : cands.map((c,i) => recoItemHTML(c, i)).join('')}
      </aside>
      <div>
        ${renderCalendar(rows, highlightMap, cands)}
        <div class="detail-panel" id="detail-panel"></div>
      </div>
    </div>`;

  document.getElementById('result-area').innerHTML = html;

  // 추천 아이템 클릭
  cands.forEach((_, i) => {
    document.getElementById(`reco-${i}`)?.addEventListener('click', () => openDetail(i, cands, school));
  });
}

function recoItemHTML(c, i) {
  const rankClass  = ['rank-1','rank-2','rank-3'][Math.min(i,2)] || 'rank-3';
  const rankLabel  = ['1순위','2순위','3순위'][Math.min(i,2)] || `${i+1}순위`;
  return `
    <div class="reco-item" id="reco-${i}">
      <div class="reco-rank ${rankClass}">${rankLabel}</div>
      <div class="reco-dates">${fmtDate(c.date_hi)} ↔ ${fmtDate(c.date_lo)}</div>
      <div class="reco-scores">
        <span class="score-pill">score ${c.swap_score.toFixed(3)}</span>
        <span class="score-pill">반복 gap ${c.rep_gap}</span>
        <span class="score-pill">날짜 ${c.day_gap}일 차</span>
      </div>
    </div>`;
}

/* ── 달력 렌더링 ─────────────────────────────────── */
function renderCalendar(rows, highlightMap, cands) {
  if (rows.length === 0) return '<div class="empty-state"><p>해당 학교 데이터 없음</p></div>';

  // 월 결정
  const firstDate = String(rows[0]['급식일자']);
  const year  = parseInt(firstDate.slice(0,4));
  const month = parseInt(firstDate.slice(4,6));

  const daysInMonth  = new Date(year, month, 0).getDate();
  const firstDow     = new Date(year, month-1, 1).getDay(); // 0=일

  // 날짜별 데이터 맵
  const dateMap = {};
  rows.forEach(r => { dateMap[String(r['급식일자'])] = r; });

  let cells = '';
  // 요일 헤더
  ['일','월','화','수','목','금','토'].forEach(d => {
    cells += `<div class="cal-dow">${d}</div>`;
  });
  // 빈 칸
  for (let i = 0; i < firstDow; i++) cells += `<div class="cal-cell empty"></div>`;
  // 날짜
  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${year}${String(month).padStart(2,'0')}${String(d).padStart(2,'0')}`;
    const row     = dateMap[dateKey];
    const rank    = highlightMap[dateKey];
    const hlClass = rank ? (rank <= 3 ? `highlighted-${Math.min(rank,3)}` : '') : '';
    const badgeHTML = rank && rank <= 3
      ? `<div class="cal-rank-badge badge-r${Math.min(rank,3)}">${Math.min(rank,3)}</div>` : '';

    if (!row) {
      cells += `<div class="cal-cell${hlClass?' '+hlClass:''}">
        ${badgeHTML}
        <div class="cal-date">${d}</div>
      </div>`;
      continue;
    }

    const menus = parseMenuList(row.menu_list);
    const menuHTML = menus.slice(0,4).map(m => {
      const isRep = repeated.has(m);
      return `<div class="cal-menu-item${isRep?' is-repeat':''}">${m}</div>`;
    }).join('');
    const moreHTML = menus.length > 4 ? `<div class="cal-more">+${menus.length-4}개</div>` : '';

    cells += `<div class="cal-cell has-data${hlClass?' '+hlClass:''}" data-date="${dateKey}">
      ${badgeHTML}
      <div class="cal-date">${d}</div>
      <div class="cal-menus">${menuHTML}${moreHTML}</div>
    </div>`;
  }

  return `
    <div class="calendar-wrap">
      <div class="calendar-head">
        <div class="calendar-title">${year}년 ${month}월 식단표</div>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:var(--rank1)"></span>1순위 교환</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--rank2)"></span>2순위 교환</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--rank3)"></span>3순위 교환</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--rank1)"></span><span style="font-size:10px;color:var(--rank1)">빨간 메뉴</span> = 반복</div>
        </div>
      </div>
      <div class="cal-grid">${cells}</div>
    </div>`;
}

/* ── 상세 패널 ───────────────────────────────────── */
function openDetail(idx, cands, school) {
  const c = cands[idx];
  const rank = idx + 1;
  const rankColors = [
    {col:'var(--rank1)', label:'1순위'},
    {col:'var(--rank2)', label:'2순위'},
    {col:'var(--rank3)', label:'3순위'}
  ];
  const rc = rankColors[Math.min(idx,2)];

  // 추천 아이템 선택 표시
  document.querySelectorAll('.reco-item').forEach((el,i) => {
    el.classList.toggle('selected', i === idx);
  });

  const hiMenus = c.menus_hi.map(m =>
    `<li class="${repeated.has(m)?'repeat-menu':''}">${m}${repeated.has(m)?' 🔁':''}</li>`
  ).join('');
  const loMenus = c.menus_lo.map(m =>
    `<li class="${repeated.has(m)?'repeat-menu':''}">${m}${repeated.has(m)?' 🔁':''}</li>`
  ).join('');

  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <div class="detail-head">
      <h3 style="color:${rc.col}">${rc.label} 교환 추천 상세</h3>
      <button class="close-btn" onclick="document.getElementById('detail-panel').classList.remove('visible')">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-col detail-col-hi">
        <h4>교환 대상 (반복 많음)</h4>
        <div class="detail-date">${fmtDate(c.date_hi)}</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px">반복 메뉴 ${c.rep_hi}개 포함</div>
        <ul class="detail-menu-list">${hiMenus}</ul>
      </div>
      <div class="detail-col detail-col-lo">
        <h4>교환 후보 (반복 적음)</h4>
        <div class="detail-date">${fmtDate(c.date_lo)}</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px">반복 메뉴 ${c.rep_lo}개 포함</div>
        <ul class="detail-menu-list">${loMenus}</ul>
      </div>
      <div class="detail-score-row">
        <div class="score-card">
          <div class="score-card-val">${c.swap_score.toFixed(4)}</div>
          <div class="score-card-lbl">swap score</div>
        </div>
        <div class="score-card">
          <div class="score-card-val">${c.menu_diversity.toFixed(3)}</div>
          <div class="score-card-lbl">메뉴 다양성</div>
        </div>
        <div class="score-card">
          <div class="score-card-val">${c.nutrient_sim.toFixed(3)}</div>
          <div class="score-card-lbl">영양 유사도</div>
        </div>
        <div class="score-card">
          <div class="score-card-val">${c.day_gap}일</div>
          <div class="score-card-lbl">날짜 간격</div>
        </div>
      </div>
    </div>`;
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
